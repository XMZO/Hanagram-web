<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f6f1e8] font-sans text-[#4b4038]">
    <main class="mx-auto max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
        <section class="rounded-[2rem] border border-[#ded3c6] bg-[#fffaf2] p-6 shadow-[0_24px_60px_rgba(122,106,90,0.08)]">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <div>
                    <h1 class="font-serif text-4xl font-semibold">{{ title }}</h1>
                    <p class="mt-4 text-sm leading-7 text-[#4b4038]/72">{{ description }}</p>
                </div>
                <a href="{{ settings_href }}" class="rounded-full border border-[#ded3c6] bg-white px-4 py-2 text-sm">{{ back_label }}</a>
            </div>
        </section>

        {% if banner %}
        <section class="mt-5 rounded-[1.4rem] border px-4 py-3 text-sm {% if banner.kind == 'success' %}border-[#8ca38c]/35 bg-[#eef4ee] text-[#6f866f]{% else %}border-[#d9a69a]/35 bg-[#fbefec] text-[#98675f]{% endif %}">
            {{ banner.message }}
        </section>
        {% endif %}

        <section class="mt-6 grid gap-5 lg:grid-cols-[0.95fr,1.05fr]">
            <article class="rounded-[1.8rem] border border-[#ded3c6] bg-[#fffaf2] p-5">
                <h2 class="font-serif text-2xl font-semibold">{{ qr_title }}</h2>
                <div class="mt-5 overflow-hidden rounded-[1.5rem] border border-[#ded3c6] bg-white p-4">
                    {{ qr_svg | safe }}
                </div>
                <div class="mt-4 rounded-[1.2rem] border border-[#ded3c6] bg-white px-4 py-3">
                    <p class="text-xs uppercase tracking-[0.22em] text-[#4b4038]/45">{{ secret_label }}</p>
                    <p class="mt-2 font-mono text-sm break-all">{{ secret }}</p>
                </div>
            </article>

            <article class="rounded-[1.8rem] border border-[#ded3c6] bg-[#fffaf2] p-5">
                <h2 class="font-serif text-2xl font-semibold">{{ recovery_title }}</h2>
                <p class="mt-3 text-sm leading-7 text-[#4b4038]/72">{{ recovery_description }}</p>
                <div class="mt-4 grid gap-3 sm:grid-cols-2">
                    {% for code in recovery_codes %}
                    <div class="rounded-[1rem] border border-[#ded3c6] bg-white px-4 py-3 font-mono text-sm">{{ code }}</div>
                    {% endfor %}
                </div>

                <form method="post" action="{{ confirm_action }}" class="mt-6 space-y-4">
                    <input type="hidden" name="lang" value="{{ lang }}">
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-[#4b4038]/70">{{ confirm_label }}</span>
                        <input type="text" name="code" required class="w-full rounded-[1rem] border border-[#ded3c6] bg-white px-4 py-3 outline-none focus:border-[#8ca38c]">
                    </label>
                    <button type="submit" class="rounded-[1rem] bg-[#8ca38c] px-5 py-3 text-sm font-semibold text-white hover:bg-[#6f866f]">
                        {{ confirm_submit }}
                    </button>
                </form>
            </article>
        </section>
    </main>
</body>
</html>

services:
  hanagram-web:
    image: ${HANAGRAM_IMAGE:-ghcr.io/xmzo/hanagram-web:latest}
    container_name: hanagram-web
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      # Persist the entire SESSIONS_DIR tree:
      # - users/<user>/ encrypted Telegram session blobs
      # - .hanagram/app.db metadata database
      - ./sessions:/app/sessions
